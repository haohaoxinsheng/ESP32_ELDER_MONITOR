<!-- FSR420 接线示意 SVG：展示压力传感器在面包板上的分压和接线方式。 -->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 连接 FSR420 压力传感器面包板效果图</title>
  <desc id="desc">FSR420 和 10k 欧姆电阻组成分压电路，输出接 ESP32 GPIO34 ADC，供电使用 3.3V。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3.6" fill="#111827"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f6f7f9"/>
  <text x="700" y="58" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#111827">ESP32 + FSR420 面包板接线效果图</text>
  <text x="700" y="94" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#4b5563">FSR420 使用分压电路，ADC 读取中间节点电压</text>

  <!-- Breadboard -->
  <g filter="url(#shadow)">
    <rect x="235" y="145" width="930" height="610" rx="18" fill="#fffdf7" stroke="#d1d5db" stroke-width="3"/>
    <rect x="265" y="175" width="870" height="64" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
    <rect x="265" y="660" width="870" height="64" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
    <rect x="282" y="194" width="836" height="7" rx="3" fill="#ef4444"/>
    <rect x="282" y="213" width="836" height="7" rx="3" fill="#2563eb"/>
    <rect x="282" y="679" width="836" height="7" rx="3" fill="#ef4444"/>
    <rect x="282" y="698" width="836" height="7" rx="3" fill="#2563eb"/>
    <text x="230" y="201" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ef4444">+</text>
    <text x="230" y="220" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#2563eb">-</text>
    <text x="1174" y="201" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ef4444">3.3V</text>
    <text x="1174" y="220" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#2563eb">GND</text>

    <rect x="665" y="258" width="70" height="370" rx="10" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="700" y="456" text-anchor="middle" transform="rotate(-90 700 456)" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#9ca3af">CENTER GAP</text>

    <g fill="#1f2937" opacity="0.9">
      <g id="holes-left">
        <circle cx="310" cy="285" r="5"/><circle cx="360" cy="285" r="5"/><circle cx="410" cy="285" r="5"/><circle cx="460" cy="285" r="5"/><circle cx="510" cy="285" r="5"/><circle cx="560" cy="285" r="5"/><circle cx="610" cy="285" r="5"/>
        <circle cx="310" cy="330" r="5"/><circle cx="360" cy="330" r="5"/><circle cx="410" cy="330" r="5"/><circle cx="460" cy="330" r="5"/><circle cx="510" cy="330" r="5"/><circle cx="560" cy="330" r="5"/><circle cx="610" cy="330" r="5"/>
        <circle cx="310" cy="375" r="5"/><circle cx="360" cy="375" r="5"/><circle cx="410" cy="375" r="5"/><circle cx="460" cy="375" r="5"/><circle cx="510" cy="375" r="5"/><circle cx="560" cy="375" r="5"/><circle cx="610" cy="375" r="5"/>
        <circle cx="310" cy="420" r="5"/><circle cx="360" cy="420" r="5"/><circle cx="410" cy="420" r="5"/><circle cx="460" cy="420" r="5"/><circle cx="510" cy="420" r="5"/><circle cx="560" cy="420" r="5"/><circle cx="610" cy="420" r="5"/>
        <circle cx="310" cy="465" r="5"/><circle cx="360" cy="465" r="5"/><circle cx="410" cy="465" r="5"/><circle cx="460" cy="465" r="5"/><circle cx="510" cy="465" r="5"/><circle cx="560" cy="465" r="5"/><circle cx="610" cy="465" r="5"/>
        <circle cx="310" cy="510" r="5"/><circle cx="360" cy="510" r="5"/><circle cx="410" cy="510" r="5"/><circle cx="460" cy="510" r="5"/><circle cx="510" cy="510" r="5"/><circle cx="560" cy="510" r="5"/><circle cx="610" cy="510" r="5"/>
        <circle cx="310" cy="555" r="5"/><circle cx="360" cy="555" r="5"/><circle cx="410" cy="555" r="5"/><circle cx="460" cy="555" r="5"/><circle cx="510" cy="555" r="5"/><circle cx="560" cy="555" r="5"/><circle cx="610" cy="555" r="5"/>
        <circle cx="310" cy="600" r="5"/><circle cx="360" cy="600" r="5"/><circle cx="410" cy="600" r="5"/><circle cx="460" cy="600" r="5"/><circle cx="510" cy="600" r="5"/><circle cx="560" cy="600" r="5"/><circle cx="610" cy="600" r="5"/>
      </g>
      <g id="holes-right">
        <circle cx="790" cy="285" r="5"/><circle cx="840" cy="285" r="5"/><circle cx="890" cy="285" r="5"/><circle cx="940" cy="285" r="5"/><circle cx="990" cy="285" r="5"/><circle cx="1040" cy="285" r="5"/><circle cx="1090" cy="285" r="5"/>
        <circle cx="790" cy="330" r="5"/><circle cx="840" cy="330" r="5"/><circle cx="890" cy="330" r="5"/><circle cx="940" cy="330" r="5"/><circle cx="990" cy="330" r="5"/><circle cx="1040" cy="330" r="5"/><circle cx="1090" cy="330" r="5"/>
        <circle cx="790" cy="375" r="5"/><circle cx="840" cy="375" r="5"/><circle cx="890" cy="375" r="5"/><circle cx="940" cy="375" r="5"/><circle cx="990" cy="375" r="5"/><circle cx="1040" cy="375" r="5"/><circle cx="1090" cy="375" r="5"/>
        <circle cx="790" cy="420" r="5"/><circle cx="840" cy="420" r="5"/><circle cx="890" cy="420" r="5"/><circle cx="940" cy="420" r="5"/><circle cx="990" cy="420" r="5"/><circle cx="1040" cy="420" r="5"/><circle cx="1090" cy="420" r="5"/>
        <circle cx="790" cy="465" r="5"/><circle cx="840" cy="465" r="5"/><circle cx="890" cy="465" r="5"/><circle cx="940" cy="465" r="5"/><circle cx="990" cy="465" r="5"/><circle cx="1040" cy="465" r="5"/><circle cx="1090" cy="465" r="5"/>
        <circle cx="790" cy="510" r="5"/><circle cx="840" cy="510" r="5"/><circle cx="890" cy="510" r="5"/><circle cx="940" cy="510" r="5"/><circle cx="990" cy="510" r="5"/><circle cx="1040" cy="510" r="5"/><circle cx="1090" cy="510" r="5"/>
        <circle cx="790" cy="555" r="5"/><circle cx="840" cy="555" r="5"/><circle cx="890" cy="555" r="5"/><circle cx="940" cy="555" r="5"/><circle cx="990" cy="555" r="5"/><circle cx="1040" cy="555" r="5"/><circle cx="1090" cy="555" r="5"/>
        <circle cx="790" cy="600" r="5"/><circle cx="840" cy="600" r="5"/><circle cx="890" cy="600" r="5"/><circle cx="940" cy="600" r="5"/><circle cx="990" cy="600" r="5"/><circle cx="1040" cy="600" r="5"/><circle cx="1090" cy="600" r="5"/>
      </g>
    </g>
  </g>

  <!-- ESP32 board -->
  <g filter="url(#shadow)">
    <rect x="55" y="292" width="150" height="330" rx="18" fill="#123c69" stroke="#0b253f" stroke-width="3"/>
    <rect x="87" y="318" width="86" height="54" rx="8" fill="#d1d5db" stroke="#9ca3af"/>
    <text x="130" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">ESP32</text>
    <text x="130" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">DevKit</text>
    <g font-family="Arial, sans-serif" font-size="13" fill="#ffffff">
      <circle cx="195" cy="462" r="7" fill="#f8fafc"/><text x="184" y="467" text-anchor="end">3V3</text>
      <circle cx="195" cy="512" r="7" fill="#f8fafc"/><text x="184" y="517" text-anchor="end">GND</text>
      <circle cx="195" cy="562" r="7" fill="#f8fafc"/><text x="184" y="567" text-anchor="end">GPIO34</text>
    </g>
  </g>

  <!-- FSR420 sensor -->
  <g filter="url(#shadow)">
    <circle cx="895" cy="385" r="72" fill="#111827" stroke="#374151" stroke-width="5"/>
    <circle cx="895" cy="385" r="51" fill="none" stroke="#f9fafb" stroke-width="3"/>
    <circle cx="895" cy="385" r="30" fill="none" stroke="#f9fafb" stroke-width="3"/>
    <text x="895" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">FSR420</text>
    <rect x="865" y="455" width="60" height="92" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <line x1="880" y1="545" x2="840" y2="600" stroke="#9ca3af" stroke-width="7" stroke-linecap="round"/>
    <line x1="910" y1="545" x2="890" y2="600" stroke="#9ca3af" stroke-width="7" stroke-linecap="round"/>
    <text x="895" y="310" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#111827">压力传感器</text>
  </g>

  <!-- 10k resistor -->
  <g filter="url(#shadow)">
    <line x1="555" y1="420" x2="555" y2="478" stroke="#6b7280" stroke-width="5" stroke-linecap="round"/>
    <rect x="532" y="478" width="46" height="118" rx="20" fill="#f5d0a9" stroke="#92400e" stroke-width="2"/>
    <rect x="535" y="500" width="40" height="9" fill="#8b5cf6"/>
    <rect x="535" y="525" width="40" height="9" fill="#111827"/>
    <rect x="535" y="550" width="40" height="9" fill="#ef4444"/>
    <rect x="535" y="575" width="40" height="9" fill="#d97706"/>
    <line x1="555" y1="596" x2="555" y2="698" stroke="#6b7280" stroke-width="5" stroke-linecap="round"/>
    <text x="505" y="540" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#111827">10kΩ</text>
    <text x="505" y="563" text-anchor="end" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#4b5563">下拉电阻</text>
  </g>

  <!-- Wires -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- ESP32 3V3 to red rail -->
    <path d="M195 462 C235 462 235 198 282 198" stroke="#ef4444" stroke-width="8"/>
    <!-- ESP32 GND to blue rail -->
    <path d="M195 512 C226 512 226 217 282 217" stroke="#2563eb" stroke-width="8"/>
    <!-- Red rail to FSR first leg -->
    <path d="M840 600 C805 555 804 198 1045 198" stroke="#ef4444" stroke-width="8"/>
    <!-- FSR second leg to ADC node -->
    <path d="M890 600 C785 600 725 420 555 420" stroke="#f59e0b" stroke-width="8"/>
    <!-- ADC node to ESP32 GPIO34 -->
    <path d="M555 420 C385 420 365 562 195 562" stroke="#f59e0b" stroke-width="8"/>
    <!-- Resistor bottom to blue rail -->
    <path d="M555 698 L1045 698" stroke="#2563eb" stroke-width="8"/>
  </g>

  <!-- Connection nodes -->
  <g fill="#111827" stroke="#ffffff" stroke-width="3">
    <circle cx="282" cy="198" r="8"/>
    <circle cx="282" cy="217" r="8"/>
    <circle cx="1045" cy="198" r="8"/>
    <circle cx="1045" cy="698" r="8"/>
    <circle cx="555" cy="420" r="9"/>
    <circle cx="555" cy="698" r="8"/>
    <circle cx="840" cy="600" r="8"/>
    <circle cx="890" cy="600" r="8"/>
  </g>

  <!-- Labels -->
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="420" y="335" width="275" height="52" rx="8" fill="#fff7ed" stroke="#fb923c"/>
    <text x="558" y="368" text-anchor="middle" font-size="18" font-weight="700" fill="#9a3412">ADC 节点：接 GPIO34</text>
    <line x1="558" y1="387" x2="555" y2="420" stroke="#fb923c" stroke-width="3"/>

    <rect x="1012" y="124" width="190" height="45" rx="8" fill="#fef2f2" stroke="#ef4444"/>
    <text x="1107" y="153" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">使用 ESP32 3.3V</text>

    <rect x="930" y="738" width="256" height="48" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="1058" y="768" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">GND 共地，ADC 不超过 3.3V</text>
  </g>

  <!-- Bottom circuit summary -->
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="282" y="805" width="836" height="58" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="700" y="841" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">接法：3.3V -> FSR420 -> GPIO34/ADC 节点 -> 10kΩ -> GND</text>
  </g>
</svg>

  <!-- Labels / cautions -->
  <g class="font" filter="url(#softShadow)">
    <rect x="130" y="955" width="1540" height="115" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="165" y="992" font-size="21" font-weight="700" fill="#111827">装配提醒</text>
    <text x="165" y="1025" font-size="17" fill="#334155">1. 左板红轨是 3.3V，右板红轨是外部 5V，千万不要把两个红轨直接连在一起。</text>
    <text x="165" y="1053" font-size="17" fill="#334155">2. 两块板的蓝色 GND 轨必须连通；MQ135、MQ7、舵机、继电器和 ESP32 要共地。</text>
    <text x="165" y="1081" font-size="17" fill="#334155">3. MQ 模块 AO 接 ESP32 ADC 前要确认不超过 3.3V；FSR420 可先用你手上的 1kΩ 电阻做下拉测试。</text>
  </g>

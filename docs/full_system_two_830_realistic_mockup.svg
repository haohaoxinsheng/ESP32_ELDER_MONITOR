      <stop offset="0" stop-color="#e7eaee"/>
      <stop offset="1" stop-color="#cfd6df"/>
    </linearGradient>
    <linearGradient id="bread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffefa"/>
      <stop offset="1" stop-color="#ece7dc"/>
    </linearGradient>
    <linearGradient id="esp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f5f96"/>
      <stop offset="1" stop-color="#123657"/>
    </linearGradient>
    <linearGradient id="moduleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a7fc3"/>
      <stop offset="1" stop-color="#115084"/>
